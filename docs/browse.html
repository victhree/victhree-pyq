<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Browse — VicThree Defence CDS PYQ Library</title>
<meta name="description" content="Browse CDS Previous Year Questions by topic, subtopic and year. By Anmol Sharma.">
<link rel="stylesheet" href="css/styles.css?v=17">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0B1F3A">
<link rel="apple-touch-icon" href="assets/icon-180.png?v=17">
<link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png?v=17">
</head>
<body>
<header class="header">
  <div class="banner-wrap"><img id="banner" class="banner" alt="VicThree Defence"></div>
  <div class="brand">
    <div class="v3"><span class="badge">V3</span>
      <div><h1>VicThree Defence</h1><div class="by">by Anmol Sharma</div></div>
    </div>
    <div class="sub">CDS Previous Year Questions</div>
  </div>
</header>

<main class="wrap">
  <div class="subjecthead" id="subjecthead"></div>

  <section class="filters" aria-label="Filters">
    <div class="row cols">
      <div class="field" id="field-subject">
        <label for="f-subject">Subject</label>
        <select id="f-subject"></select>
      </div>
      <div class="field">
        <label for="f-topic">Topic</label>
        <select id="f-topic"></select>
      </div>
      <div class="field">
        <label for="f-subtopic">Subtopic</label>
        <select id="f-subtopic"></select>
      </div>
      <div class="field">
        <label for="f-paper">Year / Paper</label>
        <select id="f-paper"></select>
      </div>
      <div class="field">
        <label for="f-sort">Sort</label>
        <select id="f-sort">
          <option value="year-desc">Year — newest first</option>
          <option value="year-asc">Year — oldest first</option>
          <option value="topic">Topic (A–Z)</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label for="f-search">Search question text</label>
      <input id="f-search" type="search" placeholder="e.g. monsoon, Mauryan, Gulf Stream…">
    </div>
    <div class="actions">
      <span class="result-count" id="rcount"></span>
      <label class="bm-filter"><input type="checkbox" id="f-bookmarked"> ★ Bookmarked only</label>
      <button class="btn ghost" id="f-reset">Reset filters</button>
    </div>
  </section>

  <div id="results"><div class="loading">Loading questions…</div></div>
</main>

<footer>
  <span class="gold">VicThree Defence</span> by Anmol Sharma · CDS PYQ Library ·
  Answers are previous-year public knowledge, graded in your browser.
</footer>

<script src="js/data.js?v=17"></script>
<script src="js/browse.js?v=17"></script>
</body>
</html>
